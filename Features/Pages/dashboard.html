<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynko | Dashboard</title>
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

    <header class="navbar">
        <div class="navbar-content">
            <div class="logo-container">
                <img src="../img/logo.png" alt="Lynko" class="logo-small">
                <span>Lynko</span>
            </div>
            <div class="user-stats">
                <span>⭐ XP: 1250</span>
                <span>🔥 Racha: 5</span>
            </div>
        </div>
    </header>

    <main class="dashboard-container">
        <h1>¡Hola de nuevo!</h1>
        
        <section class="materias-section">
            <h2>Tus Materias</h2>
            <div class="materias-grid">
                <article class="card materia-card" id="mate">
                    <h3>Matemáticas</h3>
                    <div class="progress-bar"><div style="width: 80%;"></div></div>
                    <button class="btn-primary">Continuar</button>
                </article>

                <article class="card materia-card" id="bio">
                    <h3>Biología</h3>
                    <div class="progress-bar"><div style="width: 45%;"></div></div>
                    <button class="btn-primary">Continuar</button>
                </article>

                <article class="card materia-card" id="eng">
                    <h3>Inglés</h3>
                    <div class="progress-bar"><div style="width: 60%;"></div></div>
                    <button class="btn-primary">Continuar</button>
                </article>
            </div>
        </section>
    </main>

</body>
</html>
