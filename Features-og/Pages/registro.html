<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynko - Crear Cuenta</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --orange-primary: #FF7A00;
            --orange-dark: #E66E00;
            --orange-light: #FFF0E0;
            --bg-main: #FDF9F5;
            --text-dark: #333333;
            --text-muted: #666666;
            --card-bg: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; position: relative; overflow: hidden; }
        
        body::before, body::after { content: ''; position: absolute; background: #FFEAD4; border-radius: 50%; filter: blur(30px); z-index: 1; opacity: 0.6; }
        body::before { width: 300px; height: 300px; top: -100px; left: -100px; }
        body::after { width: 400px; height: 400px; bottom: -150px; right: -100px; }

        .auth-container { background: var(--card-bg); width: 100%; max-width: 450px; padding: 40px 35px; border-radius: 30px; border: 1px solid #F0F0F0; box-shadow: 0 10px 30px rgba(255, 122, 0, 0.05); text-align: center; position: relative; z-index: 2; }
        .auth-logo { width: 70px; height: 70px; background: var(--orange-primary); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 35px; box-shadow: 0 4px 15px rgba(255, 122, 0, 0.2); }
        .auth-logo img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .auth-container h1 { font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .auth-container p { color: var(--text-muted); font-size: 15px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #F0F0F0; border-radius: 15px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600; background: #FAFAFA; transition: border-color 0.2s; outline: none; }
        .form-group input:focus { border-color: var(--orange-primary); background: #FFF; }
        
        .btn-auth { background: var(--orange-primary); color: white; border: none; padding: 14px; border-radius: 25px; font-weight: 800; font-size: 16px; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(255, 122, 0, 0.3); margin-top: 10px; transition: background 0.2s; }
        .btn-auth:hover { background: var(--orange-dark); }
        .btn-auth:disabled { background: #ccc; cursor: not-allowed; }
        .auth-footer { margin-top: 25px; font-size: 14px; font-weight: 600; color: var(--text-muted); }
        .auth-footer a { color: var(--orange-primary); text-decoration: none; font-weight: 700; }
        .auth-footer a:hover { text-decoration: underline; }

        .alert { padding: 12px 16px; border-radius: 15px; margin-bottom: 20px; font-weight: 600; text-align: left; }
        .alert-success { background: #D4EDDA; color: #155724; border: 1px solid #C3E6CB; }
        .alert-error { background: #F8D7DA; color: #721C24; border: 1px solid #F5C6CB; }
        .alert-info { background: #D1ECF1; color: #0C5460; border: 1px solid #BEE5EB; }

        .spinner { display: none; width: 16px; height: 16px; border: 2px solid #fff; border-top: 2px solid var(--orange-primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-logo">
            <img src="https://cdn.phototourl.com/free/2026-06-08-2a556232-b138-49a7-a830-66b7ce8a4f19.png" alt="Lynko Logo">
        </div>
        <h1>¡Únete a Lynko!</h1>
        <p>Crea tu cuenta gratis y empieza la aventura</p>

        <div id="message"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="name">Tu Nombre</label>
                <input type="text" id="name" name="name" placeholder="¿Cómo te llamas?" required>
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Crea una contraseña segura" required>
            </div>
             
            <button type="submit" class="btn-auth" id="submitBtn">
                <span id="btnText">Crear mi cuenta</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>

        <div class="auth-footer">
            ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/api/auth";
        
        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const messageDiv = document.getElementById("message");
            const submitBtn = document.getElementById("submitBtn");
            const spinner = document.getElementById("spinner");
            const btnText = document.getElementById("btnText");

            // Validaciones básicas
            if (password.length < 6) {
                showMessage("La contraseña debe tener al menos 6 caracteres", "error");
                return;
            }

            // Mostrar spinner
            submitBtn.disabled = true;
            spinner.style.display = "block";
            btnText.textContent = "Registrando...";

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Guardar token en localStorage
                    localStorage.setItem("token", data.access_token);
                    localStorage.setItem("user", JSON.stringify(data.user));
                    
                    showMessage("¡Registro exitoso! Redirigiendo...", "success");
                    
                    // Redirigir al dashboard después de 2 segundos
                    setTimeout(() => {
                        window.location.href = "inicio_lynko.html";
                    }, 2000);
                } else {
                    showMessage(data.detail || "Error en el registro", "error");
                }
            } catch (error) {
                showMessage("Error de conexión. Verifica que el servidor esté corriendo.", "error");
                console.error("Error:", error);
            } finally {
                submitBtn.disabled = false;
                spinner.style.display = "none";
                btnText.textContent = "Crear mi cuenta";
            }
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById("message");
            messageDiv.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
            
            if (type !== "success") {
                setTimeout(() => {
                    messageDiv.innerHTML = "";
                }, 5000);
            }
        }
    </script>

</body>
</html>
